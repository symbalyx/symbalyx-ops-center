<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background: #f5f5f5; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; }
    .header { background: #1a1a2e; color: white; padding: 30px 20px; text-align: center; }
    .header h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .header p { margin: 8px 0 0; font-size: 14px; color: #a0a0b0; }
    .header .badge { display: inline-block; background: #e94560; color: white; padding: 4px 12px; border-radius: 12px; font-size: 13px; margin-top: 10px; font-weight: bold; }
    .content { padding: 20px; }
    .source-title { color: #1a1a2e; font-size: 16px; font-weight: 700; border-bottom: 2px solid #e94560; padding-bottom: 6px; margin: 24px 0 12px; }
    .source-title:first-of-type { margin-top: 0; }
    .offer { padding: 12px 0; border-bottom: 1px solid #eee; }
    .offer:last-of-type { border-bottom: none; }
    .offer-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin: 0 0 4px; }
    .offer-title a { color: #1a1a2e; text-decoration: none; }
    .offer-title a:hover { color: #e94560; }
    .offer-meta { font-size: 12px; color: #666; margin: 0 0 6px; }
    .offer-meta span { margin-right: 8px; }
    .offer-summary { font-size: 13px; color: #444; margin: 4px 0; line-height: 1.4; }
    .tags { margin: 6px 0 0; }
    .tag { display: inline-block; background: #f0f0f5; color: #555; padding: 2px 10px; border-radius: 10px; font-size: 11px; margin: 2px 3px 2px 0; }
    .tag.high-urgency { background: #ffe8e8; color: #c0392b; }
    .footer { background: #f9f9f9; padding: 20px; text-align: center; font-size: 12px; color: #888; border-top: 1px solid #eee; }
    .footer p { margin: 4px 0; }
    .empty-state { text-align: center; padding: 40px 20px; color: #888; }
    .empty-state h2 { color: #1a1a2e; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>Veille Emploi Media</h1>
      <p>{DATE}</p>
      <div class="badge">{OFFER_COUNT} offres cette semaine</div>
    </div>

    <!-- Content -->
    <div class="content">
      {OFFERS_HTML}
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Veille automatisee par n8n + GPT — Talentsphere</p>
      <p>Jerome Chouraqui · jerome.chouraqui@talentsphere.fr</p>
      <p style="margin-top: 8px; font-size: 11px;">
        Pour vous desabonner ou modifier vos preferences, repondez STOP a cet email.
      </p>
    </div>

  </div>
</body>
</html>
